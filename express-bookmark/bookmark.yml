openapi: 3.1.0
info: 
  title: Bookmark
  description: An API for users who love literature.
  version: 0.0.0

servers:
  - url: "http://api.bookmark.com"
    description: Main server

  - url: "http://staging-api.bookmark.com"
    description: Server used for testing.

paths: 
  /users:
    get:
      summary: A list of users
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200': 
          description: Returns an array of user objects. If the user has a usertoken, then they will receive an array that excludes their account and any accounts that have blocked, or been blocked by, them. Guests will receive an array containing every account on Bookmark.
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
              examples:
                example1:
                  value:
                    users:
                    - id: 1
                      first_name: Andrew 
                      last_name: Taylor
                      date_of_birth: 1959-05-15
                      profile_picture: 'null'
                      alma_mater: Example University
                      degree: Associate's
                      role: Reader
                      online: true
                      hidden: false
                    - id: 2
                      first_name: Catherine 
                      last_name: Bush
                      date_of_birth: 1958-07-30
                      profile_picture: https://examplestorage.com/examplestring1/image/upload/examplestring2/image.jpg
                      alma_mater: Sample State College
                      degree: Bachelor's
                      role: Novelist
                      online: false
                      hidden: true
                    - id: 5
                      first_name: David 
                      last_name: Jones
                      date_of_birth: 1947-01-08
                      alma_mater: 'null'
                      degree: 'null'
                      role: Essayist
                      online: true
                      hidden: false
                    - id: 6
                      first_name: Roderick 
                      last_name: Stewart
                      alma_mater: A Real University
                      degree: Master's
                      role: Critic
                      online: false
                      hidden: true
        '401':
          $ref: '#/components/responses/NotAuthorized'
  
  /user:
    get:
      summary: The logged-in user's data
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200': 
          description: Returns an object containing the user's data.
          content:
            application/json:
              schema:            
                type: object
                properties: 
                  profile:
                      $ref: '#/components/schemas/User'
                  friends:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  blocked:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
              examples:
                example1:
                  value:
                    profile:
                      id: 3
                      first_name: John 
                      last_name: Johnson
                      date_of_birth: 1995-08-21,
                      profile_picture: 'null'
                      alma_mater: 'null'
                      degree: 'null'
                      role: Reader
                      online: true
                      hidden: false
                    friends:
                    - id: 1
                      first_name: Andrew
                      last_name: Taylor
                      profile_picture: null
                    - id: 2
                      first_name: Catherine
                      last_name: Bush
                      profile_picture: https://examplestorage.com/examplestring1/image/upload/examplestring2/image.jpg
                    blocked:
                    - id: 4
                      first_name: Lewis
                      last_name: Reed
                      profile_picture: null
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      security:
      - logCookie: []
      - guestCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EditUser'
      responses:
        '200': 
          description: Returns an object containing the updated user's data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditUser'
              examples:
                example1:
                  value:
                    profile:
                      id: 3
                      first_name: Johnny
                      last_name: Johnson
                      alma_mater: University of Samples
                      degree: Bachelor's
                      role: Reader
        '400':
          description: The user submitted incomplete form data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  first_name:
                    type: string
                  last_name:
                    type: string
              examples:
                example1:
                  value:
                    first_name: Please enter a first name.
                example2:
                  value:
                    last_name: Please enter a last name.
        '401':
          $ref: '#/components/responses/NotAuthorized' 
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
          
    delete:
        security:
        - logCookie: []
        - guestCookie: []
        summary: Deletes the user's account
        responses:
          '200':
            description: Deletes the user's data. Any posts, comments, messages, or groups that were created by the user will also be deleted.
          '401':
            $ref: '#/components/responses/NotAuthorized'
          '403':
            $ref: '#/components/responses/UserForbidden'
          '500':
            $ref: '#/components/responses/ServerError'
          
  /signup:
    post:
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUp'
      responses:
        '201': 
          description: The user's account was successfully created.
          headers:
            setCookie:
              schema:
                type: string
                example: usertoken=logged1a2b3c; Path=/api; HttpOnly
        '400':
          description: The user submitted an incomplete form, attempted to use an email address belonging to another user, or their passwords did not match.
          content:
            application/json:
              schema:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    email:
                      type: string
                    dob:
                      type: string
                    role:
                      type: string
                    password:
                      type: string
                    confirm:
                      type: string
              examples:
                example1:
                  value:
                    first_name: Please enter your first name.
                example2:
                  value:
                    last_name: Please enter your last name.
                example3:
                  value:
                    dob: Please enter your date of birth.
                example4:
                  value:
                    confirm: The passwords do not match.
        '500':
          $ref: '#/components/responses/ServerError'

  /login:
    post:
      summary: Log into your account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogIn'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogIn'
      responses:
        '200':
          description: The user was successfully logged in.
          headers:
            setCookie:
              schema:
                type: string
                example: usertoken=logged1a2b3c; Path=/api; HttpOnly
        '400':
          description: The user submitted incomplete or incorrect account information.
          content:
            application/json:
              schema:
                  type: object
                  properties:
                    user_err:
                      type: string
                    pass_err:
                      type: string
              examples:
                example1:
                  value:
                    user_err: No users found with this email address.
                example2:
                  value:
                    pass_err: The password is incorrect.
        '500':
          $ref: '#/components/responses/ServerError'
    
  /login/guest:
    post:
      summary: Sign in as a guest
      description: The user can sign in without creating an account, which grants them limited access to the API. They may view profile pages, posts, and comments, but they cannot create posts, chat with other users, or join groups.
      responses:
        '200':
          description: The user was successfully signed in as a guest.
          headers:
            setCookie:
              schema:
                type: string
                example: guesttoken=guest1a2b3c; Path=/api; HttpOnly
        '500':
          $ref: '#/components/responses/ServerError'
        
  /user/picture:
    patch:
      summary: Update your profile picture
      security:
      - logCookie: []
      - guestCookie: []
      requestBody:
        content:
          image/jpg:
            schema:
              type: string
              format: base64
          image/png:
            schema:
              type: string
              format: base64
      responses:
        '200': 
          description: Returns an object containing the user's name and the URL of the updated profile picture.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserImage'
              examples:
                example1:
                  value:
                    updated_image:
                      id: 3
                      profile_picture: https://examplestorage.com/examplestring9/image/upload/examplestring10/image.jpg
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500': 
          $ref: '#/components/responses/ServerError'
          
  /user/hidden:
    patch:
      summary: Toggle user visibility
      security:
      - logCookie: []
      - guestCookie: []
      description: The user can hide their online activity. Because user input is not required for this endpoint, the server will update the user's hidden status based on its initial value.
      responses:
        '200':
          description: Returns an object containing the updated hidden value. The updated value will be based on the initial value of the user's "hidden" property.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_user:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      hidden: 
                        type: boolean
              examples:
                example1:
                  value:
                    updated_user: 
                      id: 3
                      hidden: true
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /notifications:
    get:
      summary: Retrieve the user's notifications
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200':
          description: The user's notifications were successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserData'
                  pending:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserData'
              examples:
                example1:
                  value:
                    notification:
                    - id: 10
                      alerting_user:
                        first_name: Andrew
                        last_name: Taylor
                        profile_picture: 'null'
                      post:
                          id: 20
                          text: Has anyone ever read Demons? I think it's one of Dostoevsky's more underappreciated works.
                      text: liked your post
                      sent: 2026-02-27
                      checked: false
                    - id: 11
                      alerting_user:
                        first_name: Catherine
                        last_name: Bush
                        profile_picture: https://examplestorage.com/examplestring1/image/upload/examplestring2/image.jpg
                      post: 
                        id: 21
                        text: Can anyone recommend one of Herman Hesse's novels? I remember loving Siddhartha in high school.
                      text: "commented on your post: Steppenwolf is pretty beloved, if you haven't read that one yet."
                      sent: 2026-03-05
                      checked: false
                    requests:
                    - id: 6
                      first_name: Roderick 
                      last_name: Stewart
                      profile_picture: null
                    pending:
                    - id: 4
                      first_name: David
                      last_name: Jones
                      profile_picture: https://examplestorage.com/examplestring3/image/upload/examplestring4/profile.jpg
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
  
    patch: 
      summary: Check the user's notifications
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200':
          description: The user's unchecked notifications were successfully checked.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  
  /logout:
    patch:
      summary: End the current session
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200':
          description: The user was successfully logged out, and their token successfully deleted.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /user/{userid}/request:
    post:
      summary: Send a friend request
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: An id representing the user receiving the request
      responses:
        '201':
          description: Returns an object that contains the request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
              examples:
                example1:
                  value:
                    friend_request:
                      id: 30
                      requesting_user: 3
                      requested_user: 6
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /user/{userid}/accept:
    post:
      summary: Accept a friend request
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the user who sent the request
      responses:
        '201':
          description: Returns an object that contains the new friend data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewFriend'
              examples:
                example1:
                  value:
                    friend:
                      id: 40
                      friend_1: 3
                      friend_2: 5 
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
        
  /user/{userid}/reject:
    delete:
      summary: Reject a request
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the user who sent the request
      responses:
        '200':
          description: The selected user's friend request was denied.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  
  /user/{userid}/unfriend:
    delete:
      summary: Unfriend a user
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the unfriended user
      responses:
        '200':
          description: The selected user was successfully unfriended.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    
  /user/{userid}/block:
    post:
      summary: Block a user
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the blocked user
      responses:
        '201':
          description: Returns an object containing the id of the logged-in user and the blocked user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewBlock'
              examples:
                example1:
                  value:
                    block:
                      id: 50
                      blocked_user: 4
                      blocked_by: 3
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  
  /user/{userid}/unblock:
    delete:
      summary: Unblock a user
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the user no longer being blocked
      responses:
        '200':
          description: The selected user is no longer blocked.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403': 
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /groups:
    get:
      summary: Retrieve all groups
      security:
      - logCookie: []
      - guestCookie: []
      responses:
        '200':
          description: Returns array of group objects. If the user is the moderator of a group, then that group will contain arrays for requests and banned users as well.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/PartialGroup'
                  - $ref: '#/components/schemas/FullGroup'
              examples:
                example1:
                  value:
                  - id: 60
                    title: Dostoevsky Fan Club
                    description: We're a group dedicated to Dostoevsky. We primarily discuss his works, but we'll sometimes talk about the author himself.
                    group_image: https://examplestorage.com/examplestring7/image/upload/examplestring8/fyodr.jpg
                    moderator:
                      id: 3
                      first_name: Johnny
                      last_name: Johnson
                      profile_picture: https://examplestorage.com/examplestring9/image/upload/examplestring10/image.jpg
                    private: false
                    created: 2026-03-10
                    members:
                    - id: 2
                      first_name: Catherine
                      last_name: Bush
                      profile_picture: https://examplestorage.com/examplestring1/image/upload/examplestring2/image.jpg
                    - id: 5
                      first_name: David 
                      last_name: Jones
                      profile_picture: https://examplestorage.com/examplestring3/image/upload/examplestring4/image.jpg
                    banned_users:
                    - id: 4
                      first_name: Lewis
                      last_name: Reed
                      profile_picture: null
                    requests:
                    - id: 1
                      first_name: Andrew  
                      last_name: Taylor
                      profile_picture: null
                  - id: 61
                    title: Let's Talk Victorian 
                    description: The place for Victorian enthusiasts. From Tennyson to Wilde, we cover all the writers active during Victoria's reign. Every day, we discuss poetry, and every Tuesday, we host group reading sessions. Come and join us!
                    group_image: null
                    moderator:
                      id: 2
                      first_name: Catherine
                      last_name: Bush
                      profile_picture: https://examplestorage.com/examplestring1/image/upload/examplestring2/image.jpg
                    private: true
                    created: 2026-03-12
                    members:
                    - id: 1
                      first_name: Andrew
                      last_name: Taylor
                      profile_picture: null
                    - id: 5
                      first_name: David 
                      last_name: Jones
                      profile_picture: https://examplestorage.com/examplestring3/image/upload/examplestring4/image.jpg
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  
  /group:
    post: 
      summary: Create a group
      security:
      - logCookie: []
      - guestCookie: []
      requestBody:
        required: true
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBody'
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/GroupBody'
      responses:
        '201':
          description: Returns an object containing the newly created group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBody'
              examples:
                example1:
                  value:
                    group:
                      id: 62
                      title: Japanese Literature Circle
                      description: We discuss Japanese literature and its impacts on both Japanese culture and the broader literary world.
                      group_image: null
                      moderator: 3
                      private: true
                      created: 2026-03-17
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
            
  /group/{groupid}:
    put:
      summary: Update group information
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
          required: true
          description: The id of the edited group.
      requestBody: 
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GroupBody'
      responses:
        '200':
          description: Returns an object containing the updated group's data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
              examples:
                example1:
                  value:
                    group:
                      id: 62
                      title: Japanese Literary Circle
                      description: We discuss Japanese literature and its impacts on both Japanese culture and the broader literary world. You may discuss authors outside of Japan, but only if it's to show how Japanese literature influenced them.
                      group_image: https://examplestorage.com/examplestring15/image/upload/examplestring16/image.jpg
                      private: false
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    
    delete:
      summary: Delete a group
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
          required: true
          description: The id of the deleted group
      description: The user may delete a group they've created. In addition to the group, all posts, comments, requests, bans, and memberships associated with it will be deleted as well.
      responses:
        '200':
          description: The group was successfully deleted.
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /group/{groupid}/private:
    patch:  
      summary: Toggle group visibility
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
          required: true
          description: The id of the updated group
      responses: 
        '200':
          description: Returns an object containing the updated privacy value. The updated value depends on the initial value of the user's "privacy" property.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: 
                    type: integer
                    format: int64
                  title:
                    type: string
                  private:
                    type: boolean
              examples:
                example1:
                  value:
                    id: 62
                    title: Japanese Literary Circle
                    private: true
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /group/{groupid}/request:
    post:
      summary: Request to join a group
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
          required: true
          description: The id of the requested group
      responses:
        '201':
          description: Returns an object containing the request data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
              examples:
                example1:
                  value:
                    id: 70
                    requesting_user: 3
                    requested_group: 31
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /group/{groupid}/{userid}/accept:
    post:
      summary: Accept a user's request to join the group
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
          required: true
          description: The id of the requested group
        - in: path
          name: userid
          schema:
            type: integer
          required: true
          description: The id of the accepted user
      responses:
        '201':
          description: A new member object is created. The request will be deleted as well.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembership'
              examples:
                example1:
                  value:
                    id: 80
                    member: 1
                    member_of: 30
        '401':
          $ref: '#/components/responses/NotAuthorized'
        '403':
          $ref: '#/components/responses/UserForbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /group/{groupid}/{userid}/reject:
    delete:
      summary: Reject a user's request to join the group.
      security:
      - logCookie: []
      - guestCookie: []
      parameters:
        - in: path
          name: groupid
          schema:
            type: integer
