components:
  schemas:
    User:
      type: object
      properties:
        id: 
          type: integer
          format: int64
        first_name:
          type: string
        last_name: 
          type: string
        date_of_birth:
          type: string
        profile_picture:
          type: string
        alma_mater:
          type: string
        degree:
          type: string
        role: 
          type: string
        online:
          type: boolean
        hidden: 
          type: boolean
    
    LogIn:
      properties:
        email:
          type: string
        password:
          type: string
      
    SignUp:
      properties:
        first_name: 
          type: string
        last_name:
          type: string
        email:
          type: string
        dob:
          type: string
        role:
          type: string
        password:
          type: string
        confirm:
          type: string
    
    UserData:
      type: object
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        profile_picture: 
          type: string

    UserImage:
      type: object
      properties:
        updated_image:
          type: object
          properties:
            id:
              type: integer
              format: int64
            profile_picture:
              type: string

    UserChat:
      type: object
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name: 
          type: string
        profile_picture:
          type: string
        online:
          type: boolean
        hidden:
          type: boolean

    EditUser:
      type: object
      properties:
        profile:
          type: object
          properties:
            first_name: 
              type: string
            last_name:
              type: string
            alma_mater: 
              type: string
            degree: 
              type: string
            role:
              type: string
    
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        alerting_user:
          oneOf:
          - $ref: '#/components/schemas/UserData'
          - type: integer
            format: int64
        post:
          oneOf:
          - $ref: '#/components/schemas/Post'
          - type: integer
            format: int64
        text:
          type: string
        sent:
          type: string
        checked:
          type: boolean

